<!DOCTYPE html>
<html lang="en">


<head>

    <meta charset="UTF-8">
    <title>Week 2 JavaScript Lab</title>

</head>

<body>

    <h1>Week 2 | JavaScript Lab</h1>
    <span id="message"> </span>

    <h2>Button Clicker</h2>
    <h3 id="output">0</h3>
    <input type="button" value="Click Me!" id="btn">
    <input type="button" value="Clear Clicks" id="btn-reset">

    <!-- Example JavaScript -->
    <script>

        var name = prompt("What is your name?");
        var firstNumber = Number(prompt("What is your first number?"));
        var secondNumber = Number(prompt("What is your second number?"));
        var message = `Hello ${name}. Your Number is: ${firstNumber + secondNumber}`;
        //alert(message);

        var spanMessage = document.getElementById("message");
        spanMessage.innerHTML = message;


        //Clicker Game Code
        var clickerButton = document.querySelector("#btn");
        var clearButton = document.querySelector("#btn-reset");
        var clickerOutput = document.querySelector("#output");
        var clicks = 0;
        
        //How an event handler works
        clickerButton.addEventListener("click", function(){

            //increase the number of clicks
            clicks ++;
            displayClickerScore(clicks);
            if(clicks == 30){
                alert("Congrats on making it to 30 clicks!")
            }

        });

        clearButton.addEventListener("click", function(){

            //clear clicks
            clicks = 0;
            displayClickerScore(clicks);

        });

        function displayClickerScore()
        {

            clickerOutput.innerHTML = clicks;

        }

    </script>

</body>


</html>
